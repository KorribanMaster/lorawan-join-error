apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    uid: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    editable: true
    jsonData:
      version: Flux
      organization: victron-monitoring
      defaultBucket: victron-data
      tlsSkipVerify: true
    secureJsonData:
      token: ${INFLUXDB_TOKEN}
